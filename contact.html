<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <header>

        <div class="logo">
            <h3>Tourismo</h3>
        </div>

        <nav>
            <a href="acceuil.html">Accueil</a>
            <a href="preview_catalogue.html">Catalogue</a>
            <a href="nos_services.html">Nos services</a>
            <a href="contact.html">Contact</a>
            <a href="localisation.html">Localisation</a>
        </nav>


        <div class="recherche">
            <input type="text" placeholder="Recherche">
            <button>🔍</button>
        </div>

    </header>


    <section class="contact-titre">
        <h1>Contactez-nous</h1>
        <p>Une question ? Une demande ? Nous sommes disponibles.</p>
    </section>


    <form id="contact-form" class="contact-form">
        <div class="form-group">
            <input type="text" name="user_name" placeholder="Votre nom" required>
        </div>

        <div class="form-group">
            <input type="email" name="user_email" placeholder="Votre email" required>
        </div>

        <div class="form-group">
            <textarea name="message" rows="6" placeholder="Votre message..." required></textarea>
        </div>

        <button type="submit" class="contact-btn">
            Envoyer le message
        </button>

        <p class="success-message">✅ Message envoyé avec succès.</p>
    </form>

    <section class="infos-contact">
        <p>Paris, France</p>
        <p>01 23 45 67 89</p>
        <p>Contact@tourismo.fr</p>
    </section>


<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("UV1c90WNCvKNokjKw");
})();

const form = document.getElementById("contact-form");
const successMessage = document.querySelector(".success-message");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  emailjs.sendForm(
    "service_n312rwe",
    "template_xyn5mcm",
    this
  )
  .then(function() {
      successMessage.style.display = "block";
      form.reset();
  }, function(error) {
      alert("Erreur lors de l'envoi.");
      console.log(error);
  });
});
</script>

</body>
</html>
